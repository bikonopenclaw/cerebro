    post:
      tags:
      - Apoiar
      summary: Serviço do tipo Apoiar. Acionado por serviços auxiliares de suporte
        à solução.
      parameters:
      - name: jwt_token
        in: header
        description: Token obrigatório a ser informado em todas as requisições. Esse
          token é obtido do serviço /Authenticate do SAPI.
        schema:
          type: string
      requestBody:
        description: Objeto com a estrutura de dados de entrada no formato JSON.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DadosEntrada'
          text/json:
            schema:
              $ref: '#/components/schemas/DadosEntrada'
          application/*+json:
            schema:
              $ref: '#/components/schemas/DadosEntrada'
        required: false
      responses:
        200:
          description: Success
          content: {}
        400:
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        401:
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
