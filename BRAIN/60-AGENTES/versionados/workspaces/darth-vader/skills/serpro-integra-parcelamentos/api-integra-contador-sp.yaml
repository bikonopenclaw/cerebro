openapi: 3.0.1
info:
  title: "API Integra Contador"
  description: "O Integra Contador é uma plataforma de serviços, que fornece um conjunto de API´s, para escritórios de contabilidade e demais empresas do ramo contábil, otimizando a prestação de serviços aos contribuintes."
  
  version: v1
servers:
  - url: "https://gateway.apiserpro.serpro.gov.br/integra-contador/v1"
    description: "Produção"
paths:
