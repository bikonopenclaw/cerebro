components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    DadosEntrada:
      type: object
      properties:
        contratante:
          $ref: '#/components/schemas/Identificacao'
        autorPedidoDados:
          $ref: '#/components/schemas/Identificacao'
        contribuinte:
          $ref: '#/components/schemas/Identificacao'
        pedidoDados:
          $ref: '#/components/schemas/PedidoDados'
    Identificacao:
      type: object
      properties:
        numero:
          type: string
        tipo:
          $ref: '#/components/schemas/TipoNi'
    PedidoDados:
      type: object
      properties:
        idSistema:
          type: string
        idServico:
          type: string
        versaoSistema:
          type: string
        dados:
          type: string
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
      additionalProperties:
        type: object
    TipoNi:
      type: integer
      format: int32
      enum:
      - 1
      - 2
security:
  - bearerAuth: []
