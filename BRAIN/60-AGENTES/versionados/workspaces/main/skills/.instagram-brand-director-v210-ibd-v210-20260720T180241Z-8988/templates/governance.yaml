version: 3
production_default: blocked
external_action_lock: true
owner:
  role: "proprietário"
  id: ""
  channel: "telegram"
  chat_id: ""
approval:
  bind_to_payload_hash: true
  bind_to_action: true
  bind_to_destination: true
  bind_to_provider: true
  bind_to_asset_version: true
  require_trusted_owner_event: true
  single_use: true
  revocable: true
  default_ttl_minutes: 60
  lifecycle: ["approved", "reserved", "executing", "succeeded", "failed", "indeterminate"]
events:
  format: "jsonl"
  append_only: true
  hash_chain: true
  verify_before_external_action: true
governance_engine:
  default_decision: "deny"
  require_enabled_actor: true
  require_enabled_provider: true
  require_approval_for_external: true
  require_result_event: true
actors:
  robotnik:
    may: ["research", "strategy", "copy", "creative_direction", "prepare_assets", "read_metrics"]
    may_not: ["approve_external_action", "publish_without_approval", "change_brand_policy"]
  puppet_master:
    may: ["coordinate", "review", "consolidate", "record_owner_approval"]
    may_not: ["approve_on_behalf_of_owner"]
  kowalski:
    may: ["brand_lock", "brand_qa"]
    may_not: ["approve_external_action", "publish"]
  skipper:
    enabled: false
    may: ["research_assist"]
    may_not: ["approve_external_action", "publish"]
  rico:
    enabled: false
    may: ["qa_assist"]
    may_not: ["brand_qa", "approve_external_action", "publish"]
  private:
    enabled: false
    may: ["compliance_assist"]
    may_not: ["accept_residual_risk", "approve_external_action", "publish"]
